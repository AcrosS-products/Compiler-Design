<!DOCTYPE html>
<html>
<head>
    <title>XSS Test</title>
</head>
<body>

    <h2>Search Page</h2>

    <form method="GET">
        <input type="text" name="q" placeholder="Search here">
        <button type="submit">Search</button>
    </form>

    <p>Results for: 
        <span id="output"></span>
    </p>

    
<script>
  const params = new URLSearchParams(window.location.search);
  const userInput = params.get("q");
  document.getElementById("output").textContent = userInput; // AUTO-FIXED: innerHTML → textContent

</script>



</body>
</html>
